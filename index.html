<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JV Tech | Tech & Educação</title>
  <meta name="description" content="Desenvolvedor | Projetos | Contato" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1e1b4b;      /* roxo escuro */
      --secondary: #4f46e5;    /* roxo médio / indigo */
      --accent: #fbbf24;       /* amarelo âmbar */
      --soft-bg: #e0e7ff;      /* lavanda suave */
      --text-light: #ffffff;
      --page-bg: #f8fafc;      /* cinza quase branco */
      --text-dark: #111827;
      --text-muted: #64748b;
      --card-bg: rgba(255, 255, 255, 0.82);
      --border: rgba(255, 255, 255, 0.35);
      --shadow: 0 20px 50px rgba(30, 27, 75, 0.18);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top right, rgba(79, 70, 229, 0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(251, 191, 36, 0.14), transparent 25%),
        linear-gradient(135deg, var(--page-bg), #eef2ff 45%, #f8fafc 100%);
      color: var(--text-dark);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    /* elementos decorativos */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
    }

    .blob.one {
      width: 220px;
      height: 220px;
      background: var(--secondary);
      top: 5%;
      left: 5%;
      animation: float1 8s ease-in-out infinite;
    }

    .blob.two {
      width: 260px;
      height: 260px;
      background: var(--accent);
      bottom: 8%;
      right: 6%;
      animation: float2 10s ease-in-out infinite;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 520px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px 24px 24px;
      text-align: center;
      animation: fadeUp 0.9s ease;
    }

    .logo-wrapper {
    width: 150px;
    height: 150px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(79, 70, 229, 0.12), rgba(251, 191, 36, 0.12));
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(79, 70, 229, 0.12);
    box-shadow: 0 10px 30px rgba(79, 70, 229, 0.10);
    overflow: hidden;
    padding: 8px;
    }

    .logo-wrapper img {
    width: 135%;
    height: 135%;
    object-fit: contain;
    display: block;
    transform: scale(1.08);
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.2;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.98rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      font-weight: 500;
    }

    .divider {
      width: 72px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
      margin: 0 auto 24px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-light);
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      box-shadow: 0 12px 24px rgba(30, 27, 75, 0.18);
      overflow: hidden;
      isolation: isolate;
    }

    .link-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: translateX(-120%);
      transition: transform 0.7s ease;
      z-index: 0;
    }

    .link-btn:hover::before {
      transform: translateX(120%);
    }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 18px 30px rgba(30, 27, 75, 0.22);
      filter: brightness(1.03);
    }

    .link-btn:active {
      transform: translateY(-1px) scale(0.995);
    }

    .link-btn span {
      position: relative;
      z-index: 1;
    }

    .link-btn .icon {
      position: relative;
      z-index: 1;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-btn.secondary {
      background: linear-gradient(135deg, #312e81, #4f46e5);
    }

    .link-btn.accent {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      color: #1f2937;
      box-shadow: 0 12px 24px rgba(251, 191, 36, 0.28);
    }

    .footer {
      margin-top: 22px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .footer strong {
      color: var(--primary);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(15px, -10px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-12px, 12px); }
    }

    @media (max-width: 520px) {
      .card {
        padding: 24px 18px 20px;
        border-radius: 24px;
      }

      .logo-wrapper {
        width: 104px;
        height: 104px;
      }

      h1 {
        font-size: 1.35rem;
      }

      .subtitle {
        font-size: 0.92rem;
      }

      .link-btn {
        padding: 15px 16px;
        font-size: 0.96rem;
      }
    }
  </style>
</head>
<body>
